<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in · Whackamole</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
  </head>
  <body>
    <main class="content-shell auth-shell">
      <section>
        <span class="eyebrow">Whackamole</span>
        <h1>Administrator sign in</h1>
        {% if message %}<p class="notice">{{ message }}</p>{% endif %}
        <form method="post" action="/login" class="settings">
          <input type="hidden" name="next" value="{{ next }}">
          <label>Username<input name="username" required autocomplete="username" maxlength="64" autofocus></label>
          <label>Password<input name="password" type="password" required autocomplete="current-password" maxlength="256"></label>
          <button class="button" type="submit">Sign in</button>
        </form>
        <p class="field-note">Observed client address: <strong>{{ client_ip }}</strong></p>
      </section>
    </main>
  </body>
</html>
