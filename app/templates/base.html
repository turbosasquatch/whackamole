<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Whackamole{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
  </head>
  <body>
    <header class="app-header">
      <div>
        <a class="brand" href="/">Whackamole</a>
        <span class="subtitle">Upload Assistant triage for QUI arrivals</span>
      </div>
      <nav>
        <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Dashboard</a>
        <a href="/config" class="{% if request.url.path == '/config' %}active{% endif %}">Settings</a>
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
